  <main class="page-content">
    <h1>Let's talk</h1>
    <p>Looking to grow your organic traffic or social presence? Send me a message.</p>

    <!-- 
      IMPORTANT: replace "yourFormID" below with your real Formspree ID.
      Steps: go to formspree.io → sign up free → create a form → 
      it gives you a URL like https://formspree.io/f/abc123 → paste it in action=""
    -->
    <form class="contact-form" action="https://formspree.io/f/yourFormID" method="POST">
      <input type="text" name="name" placeholder="Your name" required>
      <input type="email" name="email" placeholder="Your email" required>
      <textarea name="message" rows="5" placeholder="Your message" required></textarea>
      <button type="submit">Send message</button>
    </form>

    <p style="margin-top:24px;">Or email me directly: vishalkavitha999@gmail.com</p>
  </main>
